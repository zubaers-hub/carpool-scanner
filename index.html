<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Student Dismissal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #22263a;
    --accent: #34d399;
    --accent-dim: #059669;
    --accent-glow: rgba(52,211,153,0.15);
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
    --text: #f8fafc;
    --muted: #64748b;
    --border: #2d3148;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Overlay screens ── */
  .overlay-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 999;
    padding: 24px;
  }
  .overlay-screen.hidden { display: none; }

  .screen-logo  { font-size: 44px; line-height: 1; }
  .screen-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; text-align: center; }
  .screen-sub   { font-size: 14px; color: var(--muted); text-align: center; }

  /* ── PIN ── */
  .pin-dots { display: flex; gap: 16px; margin: 6px 0; }
  .pin-dot {
    width: 13px; height: 13px;
    border-radius: 50%;
    border: 2px solid var(--border);
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }
  .pin-dot.error  { background: var(--danger); border-color: var(--danger); }
  .pin-error { font-size: 13px; color: var(--danger); height: 16px; text-align: center; }

  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 76px);
    grid-template-rows: repeat(4, 76px);
    gap: 12px;
  }
  .pin-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text);
    font-size: 24px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s, transform 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pin-btn:active { background: var(--card); transform: scale(0.91); }
  .pin-btn.empty  { background: transparent; border-color: transparent; pointer-events: none; }

  /* ── Station selector ── */
  .station-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 340px;
  }
  .station-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    color: var(--text);
    font-size: 17px;
    font-weight: 600;
    padding: 16px 20px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s, background 0.12s, transform 0.08s;
    display: flex;
    align-items: center;
    gap: 14px;
    text-align: left;
  }
  .station-btn:active { background: var(--card); transform: scale(0.97); border-color: var(--accent); }
  .station-icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .station-label { flex: 1; }
  .station-arrow { color: var(--muted); font-size: 14px; }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 8px;
  }
  .header-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .dot {
    width: 8px; height: 8px; flex-shrink: 0;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .header h1 {
    font-size: 15px; font-weight: 700;
    letter-spacing: -0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .station-badge {
    font-size: 11px; font-weight: 600;
    background: var(--accent-glow);
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .scan-count {
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    min-width: 28px;
    text-align: center;
  }
  .lock-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .lock-btn:active { background: var(--border); }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Input panel ── */
  .input-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    gap: 20px;
    min-width: 0;
  }

  .scan-card {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .scan-card-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .scan-input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 22px;
    font-weight: 600;
    padding: 16px 18px;
    outline: none;
    text-align: center;
    letter-spacing: 3px;
    -webkit-appearance: none;
    caret-color: var(--accent);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .scan-input::placeholder {
    color: var(--muted);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0;
  }
  .scan-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .ready-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    align-self: center;
  }
  .ready-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s infinite;
  }

  /* ── Scans panel ── */
  .scans-panel {
    width: 260px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .panel-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 5px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .clear-btn:active { background: var(--border); }
  .scans-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .scan-item {
    background: var(--card);
    border-radius: 10px;
    padding: 9px 11px;
    border-left: 2px solid var(--accent);
    animation: slideIn 0.2s ease;
  }
  .scan-item.error { border-left-color: var(--danger); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .scan-name { font-size: 13px; font-weight: 600; line-height: 1.2; }
  .scan-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
    gap: 6px;
    padding: 16px;
    text-align: center;
  }
  .empty-icon { font-size: 28px; opacity: 0.3; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 220px;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast-icon { font-size: 24px; flex-shrink: 0; }
  .toast-name { font-size: 15px; font-weight: 700; }
  .toast-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* ── Mobile tweaks ── */
  @media (max-width: 480px) {
    .scans-panel { width: 140px; }
    .scan-name { font-size: 11px; }
    .scan-meta { font-size: 9px; }
    .panel-header { font-size: 9px; padding: 10px; }
    .scan-card { padding: 18px; }
    .pin-pad {
      grid-template-columns: repeat(3, 70px);
      grid-template-rows: repeat(4, 70px);
      gap: 10px;
    }
  }
</style>
</head>
<body>

<!-- PIN Screen -->
<div class="overlay-screen" id="pinScreen">
  <div class="screen-logo">🔐</div>
  <div class="screen-title">Staff Access Only</div>
  <div class="screen-sub">Enter your PIN to continue</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-error" id="pinError"></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn empty"></button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="pinDelete()">⌫</button>
  </div>
</div>

<!-- Station Selector -->
<div class="overlay-screen hidden" id="stationScreen">
  <div class="screen-logo">📍</div>
  <div class="screen-title">Select Station</div>
  <div class="screen-sub">Which station are you working at today?</div>
  <div class="station-list">
    <button class="station-btn" onclick="selectStation('Site A', '🅰️')">
      <span class="station-icon">🅰️</span>
      <span class="station-label">Site A</span>
      <span class="station-arrow">›</span>
    </button>
    <button class="station-btn" onclick="selectStation('Site B', '🅱️')">
      <span class="station-icon">🅱️</span>
      <span class="station-label">Site B</span>
      <span class="station-arrow">›</span>
    </button>
    <button class="station-btn" onclick="selectStation('Walker', '🚶')">
      <span class="station-icon">🚶</span>
      <span class="station-label">Walker</span>
      <span class="station-arrow">›</span>
    </button>
  </div>
</div>

<!-- Main App -->
<div class="header">
  <div class="header-left">
    <div class="dot"></div>
    <h1>Student Dismissal</h1>
    <div class="station-badge" id="stationBadge">—</div>
  </div>
  <div class="header-right">
    <span style="font-size:11px;color:var(--muted)" id="statusText">Ready</span>
    <div class="scan-count" id="scanCount">0</div>
    <button class="lock-btn" onclick="lockApp()">🔒 Lock</button>
  </div>
</div>

<div class="main">
  <div class="input-panel">
    <div class="scan-card">
      <div class="scan-card-label">Student ID</div>
      <input
        class="scan-input"
        id="scanInput"
        placeholder="Scan or type ID…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <div class="ready-pill">
        <div class="ready-dot"></div>
        Ready to scan
      </div>
    </div>
  </div>

  <div class="scans-panel">
    <div class="panel-header">
      Recent
      <button class="clear-btn" onclick="clearScans()">Clear</button>
    </div>
    <div class="scans-list" id="scansList">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div>No scans yet</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-icon" id="toastIcon">✅</div>
  <div>
    <div class="toast-name" id="toastName"></div>
    <div class="toast-sub" id="toastSub"></div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYjeojJLLURbZMxn1blDkCx7jyKCjSCNJUwUcOOxB-DO1RHUMLJfFl3BmSKTS5pA/exec";
const CORRECT_PIN = "1234"; // ← Change this to your PIN
const COOLDOWN_MS = 5000;

let pinEntry = "";
let lastScanned = {};
let totalScans = 0;
let unlocked = false;
let currentLocation = "";

const pinScreen     = document.getElementById("pinScreen");
const stationScreen = document.getElementById("stationScreen");
const scanInput     = document.getElementById("scanInput");
const statusTx      = document.getElementById("statusText");
const scanCount     = document.getElementById("scanCount");
const scansList     = document.getElementById("scansList");
const stationBadge  = document.getElementById("stationBadge");
const toast         = document.getElementById("toast");
const toastName     = document.getElementById("toastName");
const toastSub      = document.getElementById("toastSub");
const toastIcon     = document.getElementById("toastIcon");
const pinError      = document.getElementById("pinError");

// ── PIN ──
function pinPress(digit) {
  if (pinEntry.length >= 4) return;
  pinEntry += digit;
  updatePinDots();
  if (pinEntry.length === 4) setTimeout(checkPin, 120);
}

function pinDelete() {
  pinEntry = pinEntry.slice(0, -1);
  updatePinDots();
  pinError.textContent = "";
}

function updatePinDots(state) {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById("pd" + i);
    dot.className = "pin-dot" + (i < pinEntry.length ? " filled" : "") + (state === "error" ? " error" : "");
  }
}

function checkPin() {
  if (pinEntry === CORRECT_PIN) {
    pinScreen.classList.add("hidden");
    stationScreen.classList.remove("hidden");
  } else {
    updatePinDots("error");
    pinError.textContent = "Incorrect PIN — try again";
    pinEntry = "";
    setTimeout(() => { updatePinDots(); pinError.textContent = ""; }, 1000);
  }
}

// ── Station ──
function selectStation(name, icon) {
  currentLocation = name;
  stationBadge.textContent = icon + " " + name;
  stationScreen.classList.add("hidden");
  unlocked = true;
  scanInput.focus();
}

function lockApp() {
  unlocked = false;
  currentLocation = "";
  pinEntry = "";
  updatePinDots();
  pinError.textContent = "";
  stationBadge.textContent = "—";
  pinScreen.classList.remove("hidden");
  stationScreen.classList.add("hidden");
}

// ── Scanner ──
document.addEventListener("click", () => { if (unlocked) scanInput.focus(); });
document.addEventListener("touchend", () => { if (unlocked) scanInput.focus(); });

scanInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    const val = scanInput.value.trim();
    if (val) { handleScan(val); scanInput.value = ""; }
  }
});

function handleScan(studentId) {
  studentId = studentId.replace(/^0+/, "");
  if (!studentId || !unlocked) return;
  const now = Date.now();
  if (lastScanned[studentId] && (now - lastScanned[studentId]) < COOLDOWN_MS) {
    showToast("⚠️", studentId, "Already scanned recently");
    return;
  }
  lastScanned[studentId] = now;
  if (navigator.vibrate) navigator.vibrate(60);
  sendToSheet(studentId);
}

async function sendToSheet(studentId) {
  statusTx.textContent = "Sending…";
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ studentId, location: currentLocation }),
      mode: "no-cors"
    });
    totalScans++;
    scanCount.textContent = totalScans;
    addScanItem(studentId, currentLocation, "success");
    showToast("✅", studentId, currentLocation);
  } catch (err) {
    addScanItem(studentId, "Failed — check connection", "error");
    showToast("⚠️", studentId, "Send failed");
  }
  statusTx.textContent = "Ready";
}

function addScanItem(id, sub, type) {
  const empty = scansList.querySelector(".empty-state");
  if (empty) empty.remove();
  const item = document.createElement("div");
  item.className = "scan-item " + type;
  const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  item.innerHTML = '<div class="scan-name">' + id + '</div><div class="scan-meta">' + sub + " · " + time + "</div>";
  scansList.insertBefore(item, scansList.firstChild);
}

let toastTimer;
function showToast(icon, name, sub) {
  toastIcon.textContent = icon;
  toastName.textContent = name;
  toastSub.textContent  = sub;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 2500);
}

function clearScans() {
  scansList.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div>No scans yet</div></div>';
  totalScans = 0;
  scanCount.textContent = 0;
}
</script>
</body>
</html>
